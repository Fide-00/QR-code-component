<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <style>
            input[type="password"]
            {
                color: cyan;
                background-color: blue;
                border-radius: 5px;
            }
            input[type="submit"]
            {
                border-color:orange;
                border-radius: 10px;
                font-weight: bold;
                width: 100px;
                height: 30px;
            }
            input[type="text"], input[type="email"]
            {
                border-radius: 5px;
                border:1px solid green
            }
        </style>
    </head>
    <body>
        <fieldset>
            <form>
                <label for="fn">FirstName:</label>
                <input type="text" name="firstname" id="fn">

                <label for="mn">MiddleName:</label>
                <input type="text" name="middlename" id="mn">

                <label for="ln">LastName:</label>
                <input type="text" name="lastname" id="ln">
                <br>

                <label for="e1">Email:</label>
                <input type="email" name="email" id="e1">
                <br>

                <label for="pass">Password:</label>
                <input type="password" name="password" id="pass">
                <br>

                <label for="remember">Remember me</label>
                <input type="radio" name="rememberme" id="remember">
                <br>
                
                <input type="submit">

            </form>
        </fieldset>
    </body>
</html>
