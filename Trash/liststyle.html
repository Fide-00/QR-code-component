<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <style>
            .listitems
            {
                font-size:25px;
            }
            ul
            {
                list-style-type: circle;
            }
            ol
            {
                list-style-type: upper-roman;
            }
            #imagelist
            {
                list-style-image: url("https://blob.sololearn.com/courses/logo.png");
            }

        </style>
    </head>
    <body>
        <h1>Checklist</h1>

        <ul>
            <div class="listitems">
                <li>Book</li>
                <li>Pencil</li>
                <li>Tablet</li>
                <li>Marker</li>
            </div>
        </ul>

        <h1>Top 4 Anime</h1>
        <ol>
            <div class="listitems">
                <li>Naruto</li>
                <li>One Piece</li>
                <li>Dragon Ball</li>
                <li>Bleach</li>
            </div>
        </ol>

        <h1>ImageList</h1>
        <ol id="imagelist">
            <div class="listitems">
                <li>Sololearn</li>
                <li>Advance</li>
        </ol>
    </body>
</html>
