<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Navigation</title>

        <style>
            ul{
                position: fixed;
                top: 0;
                left: 0;
                margin: 0;
                padding: 0;
                list-style-type: none;
                background-color:lightslategray;
                width: 25%;
                height: 100%;
                border-right: 2px solid rgb(199, 199, 199);

            }

            li a{
                display: block;
                text-decoration: none;
                font-family: Arial, Helvetica, sans-serif;
                color: white;
                padding: 12px 15px;
                
            }

            li{
                border-bottom: 1px solid rgb(102, 102, 102) ;
            }

            li:last-child{
                border: none;
            }


            a:hover{
                background-color: rgba(48, 67, 67, 0.658);
            }

            li a.activeElement{
                background-color: rgba(47, 255, 68, 0.699);
            }





        </style>
    </head>
    <body>
        <ul>
            <li><a href="#" class="activeElement">Home</a></li>
            <li><a href="#">Contents</a></li>
            <li><a href="#">Contacts</a></li>
            <li><a href="#">More</a></li>
        </ul>
        
    </body>
</html>
